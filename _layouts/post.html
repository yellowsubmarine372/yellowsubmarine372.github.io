---
layout: compress
---

{% include head.html %}

<main>

    {% include header.html %}

    <div class="post-hero">
        <h1 class="post-title">{{ page.title }}</h1>
        <time class="post-date" datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>
        {% if page.subtitle %}<p class="post-subtitle">{{ page.subtitle }}</p>{% endif %}
    </div>

    <div class="post-body">
        {{ page.content }}
    </div>

    <a class="post-back" href="{{ site.baseurl }}/">← all posts</a>

</main>

</body>
</html>
